name: Build LinkTalk Android APK

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-apk:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Install Android packages
        shell: bash
        run: |
          sdkmanager "platform-tools" "platforms;android-35" "build-tools;35.0.0"

      - name: Build debug APK
        shell: bash
        env:
          PUBLIC_APP_URL: ${{ vars.PUBLIC_APP_URL }}
          REPOSITORY_OWNER: ${{ github.repository_owner }}
          REPOSITORY_NAME: ${{ github.event.repository.name }}
        run: |
          set -euo pipefail
          APP_URL="${PUBLIC_APP_URL:-}"
          if [ -z "$APP_URL" ]; then
            if [ -s CNAME ]; then
              PUBLIC_DOMAIN="$(tr -d '\r\n' < CNAME)"
              if [ -n "$PUBLIC_DOMAIN" ]; then
                APP_URL="https://${PUBLIC_DOMAIN}/"
              fi
            fi
          fi
          if [ -z "$APP_URL" ]; then
            APP_URL="https://${REPOSITORY_OWNER}.github.io/${REPOSITORY_NAME}/"
          fi
          gradle -p android app:assembleDebug -PappUrl="$APP_URL"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: linktalk-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
