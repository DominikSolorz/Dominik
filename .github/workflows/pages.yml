name: Deploy LinkTalk Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: linktalk-pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Install Android packages
        shell: bash
        run: |
          sdkmanager "platform-tools" "platforms;android-35" "build-tools;35.0.0"

      - name: Prepare static site
        shell: bash
        env:
          SUPABASE_URL: ${{ vars.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ vars.SUPABASE_ANON_KEY }}
          PUBLIC_APP_URL: ${{ vars.PUBLIC_APP_URL }}
          APK_URL: ${{ vars.APK_URL }}
          REPOSITORY_OWNER: ${{ github.repository_owner }}
          REPOSITORY_NAME: ${{ github.event.repository.name }}
        run: |
          set -euo pipefail
          mkdir -p dist
          cp index.html styles.css app.js app-enhancements.js manifest.webmanifest service-worker.js icon.svg config.example.js dist/
          if [ -f .nojekyll ]; then
            cp .nojekyll dist/.nojekyll
          fi
          if [ -f CNAME ]; then
            cp CNAME dist/CNAME
          fi
          if [ -d downloads ]; then
            cp -R downloads dist/downloads
          fi

          PUBLIC_URL="${PUBLIC_APP_URL:-}"
          if [ -z "$PUBLIC_URL" ]; then
            if [ -s CNAME ]; then
              PUBLIC_DOMAIN="$(tr -d '\r\n' < CNAME)"
              if [ -n "$PUBLIC_DOMAIN" ]; then
                PUBLIC_URL="https://${PUBLIC_DOMAIN}/"
              fi
            fi
          fi
          if [ -z "$PUBLIC_URL" ]; then
            PUBLIC_URL="https://${REPOSITORY_OWNER}.github.io/${REPOSITORY_NAME}/"
          fi

          APK_LINK="${APK_URL:-./downloads/linktalk-debug.apk}"

          if [ -n "${SUPABASE_URL:-}" ] && [ -n "${SUPABASE_ANON_KEY:-}" ]; then
            printf '%s\n' \
              'window.LINKTALK_CONFIG = {' \
              "  supabaseUrl: \"${SUPABASE_URL}\"," \
              "  supabaseAnonKey: \"${SUPABASE_ANON_KEY}\"," \
              "  publicAppUrl: \"${PUBLIC_URL}\"," \
              "  apkUrl: \"${APK_LINK}\"" \
              '};' \
              '' \
              'window.BLISKOCHAT_CONFIG = window.LINKTALK_CONFIG;' \
              > dist/config.js
          else
            cp config.js dist/config.js
          fi

          mkdir -p dist/downloads
          set +e
          gradle -p android app:assembleDebug -PappUrl="$PUBLIC_URL"
          APK_BUILD_EXIT=$?
          set -e

          APK_READY=false
          if [ "$APK_BUILD_EXIT" -eq 0 ] && [ -f android/app/build/outputs/apk/debug/app-debug.apk ]; then
            cp android/app/build/outputs/apk/debug/app-debug.apk dist/downloads/linktalk-debug.apk
            cp android/app/build/outputs/apk/debug/app-debug.apk dist/downloads/bliskochat-debug.apk
            APK_READY=true
          else
            echo "Android build was not ready in this run. Keeping existing downloads fallback."
          fi

          BUILD_TIME="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          DOWNLOAD_URL="${PUBLIC_URL%/}/downloads/linktalk-debug.apk"
          printf '%s\n' \
            '{' \
            "  \"app\": \"LinkTalk\"," \
            "  \"builtAt\": \"${BUILD_TIME}\"," \
            "  \"commit\": \"${GITHUB_SHA}\"," \
            "  \"siteUrl\": \"${PUBLIC_URL}\"," \
            "  \"apkUrl\": \"${DOWNLOAD_URL}\"," \
            "  \"apkReady\": ${APK_READY}" \
            '}' \
            > dist/health.json

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
