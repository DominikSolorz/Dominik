plugins {
    id "com.android.application"
}

def appUrl = providers.gradleProperty("appUrl").orElse("https://example.com/").get()

android {
    namespace "pl.bliskochat.app"
    compileSdk 35

    defaultConfig {
        applicationId "pl.bliskochat.app"
        minSdk 23
        targetSdk 35
        versionCode 1
        versionName "1.0.0"
        buildConfigField "String", "APP_URL", "\"${appUrl}\""
    }

    buildFeatures {
        buildConfig true
    }
}
